server:
  listen: 0.0.0.0:9480
  admin_key: CHANGE_ME_ADMIN_KEY
  public_url: https://sub.example.com
  db_path: /var/lib/xray-master/data.db

provision:
  ssh_user: root
  ssh_key_path: /etc/xray-master/id_ed25519
  master_ip: ""              # auto-detect public IP if empty
  node_api_port: 9472
  xray_node_install_script: https://raw.githubusercontent.com/thethoughtcriminal/xray-node/main/scripts/install.sh

subscription:
  update_interval_hours: 12
  profiles:
  - name: "🚀 SMART Auto"
    mode: smart_multi
    entries:
    - node: nl-1
      inbound: vless-reality
      label: "🇳🇱 Netherlands"
    - node: se-1
      inbound: vless-reality
      label: "🇸🇪 Sweden"

  - name: "Dedicated Hy2"
    mode: single
    entries:
    - node: de-1
      inbound: hysteria2
      label: "🇩🇪 Hysteria2"
